name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-groupingtags:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GroupingTags

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: GroupingTags/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint
        continue-on-error: true

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: groupingtags-dist
          path: GroupingTags/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: [ build-groupingtags ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4
        with:
          ref: build
          path: build-branch

      - name: Download GroupingTags dist
        uses: actions/download-artifact@v4
        with:
          name: groupingtags-dist
          path: deploy/

      - name: Preserve DanbooruInsights transition build
        run: |
          # The DanbooruInsights project has moved to its own repo
          # (AkaringoP/Danbooru-Insights). We keep the v9.0.1 transition
          # build on this branch indefinitely so legacy installs can fetch
          # it once and then self-migrate via its embedded @updateURL.
          if [ -f build-branch/danbooruinsights.user.js ]; then
            cp build-branch/danbooruinsights.user.js deploy/
          fi

      - name: Deploy to Build Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: build
          force_orphan: true
