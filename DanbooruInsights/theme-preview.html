<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DanbooruInsights Theme & Grass Color Preview</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { color: #333; margin-bottom: 5px; }
  h2 { color: #666; margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-top: 15px; }
  .card { border-radius: 8px; padding: 16px; border: 1px solid #ddd; }
  .card h3 { margin: 0 0 6px 0; font-size: 14px; }
  .grass-label { font-size: 11px; opacity: 0.5; margin: 6px 0 3px 0; }
  .heatmap { display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px; }
  .cell { width: 100%; aspect-ratio: 1; border-radius: 2px; }
</style>
</head>
<body>
<h1>DanbooruInsights Theme & Grass Color Preview</h1>
<p style="color:#888;">12 themes x 4 grass options each. ★ = Recommended.</p>

<h2>Light Themes (6)</h2>
<div class="grid" id="light"></div>

<h2>Dark Themes (6)</h2>
<div class="grid" id="dark"></div>

<script>
const pattern = [0,0,1,0,2,1,0,3,2,1,0,0,1,2,0, 0,1,0,0,2,4,1,0,0,1,2,0,1,0,0, 1,0,2,1,0,0,3,2,1,0,0,1,0,2,1, 0,0,1,2,3,1,0,0,1,0,2,0,1,3,0];

function makeHeatmap(empty, lvls) {
  return pattern.map(level => {
    const color = level === 0 ? empty : lvls[level];
    return `<div class="cell" style="background:${color}"></div>`;
  }).join('');
}

function renderCard(container, theme) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = theme.bg;
  card.style.color = theme.text;

  let html = `<h3>${theme.name}</h3>`;
  html += `<div style="font-size:11px;opacity:0.4;margin-bottom:8px;">bg: ${theme.bg.length > 40 ? 'gradient' : theme.bg} · empty: ${theme.empty}</div>`;

  theme.grassOptions.forEach((opt, i) => {
    const label = i === 0 ? `★ ${opt.name}` : opt.name;
    html += `<div class="grass-label">${label}</div>`;
    html += `<div class="heatmap">${makeHeatmap(theme.empty, opt.levels)}</div>`;
  });

  card.innerHTML = html;
  container.appendChild(card);
}
